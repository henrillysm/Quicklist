<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist</title>
    
    <link rel="stylesheet" href="./styles/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

</head>

<body>
    <header class="container">
        <div class="logo">
            <img src="./assets/img/logo.png" alt="">
            <span>quicklist</span>
        </div>
        <div class="header-flex">
            <nav>
                <a href=""><- Voltar</a>
            </nav>
            <h1>Compras da semana</h1>
        </div>
    </header>

    <form action="" class="container" id="listForm">
        <div class="addItems">
            <input type="text" id="inItem" placeholder="Adicione um novo item">
            <button type="submit" id="btn">Adicionar item</button>
        </div>

        <ul class="itemList" data-rule="list">
            <li>
                <div class="checkbox-wrapper">
                    <div class="checkbox-image"></div>
                    <input type="checkbox" name="pao de forma" id="item001">
                    <label for="item001">Pão de forma</label>
                </div>
                <button type="button" class="btn-delete">
                    <img src="./assets/lixeira.png" alt="">
                </button>
                
            </li>

            <li>
                <div class="checkbox-wrapper">
                    <div class="checkbox-image"></div>
                    <input type="checkbox" name="café preto" id="item002">
                    <label for="item002">Café preto</label>
                </div>
                <button type="button" class="btn-delete">
                    <img src="./assets/lixeira.png" alt="">
                </button>
                
            </li>

            <li>
                <div class="checkbox-wrapper">
                    <div class="checkbox-image"></div>
                    <input type="checkbox" name="suco de laranja" id="item003">
                    <label for="item003">Suco de laranja</label>
                </div>
                <button type="button" class="btn-delete" type="button">
                    <img src="./assets/lixeira.png" alt="">
                </button>
            </li>

            <li>
                <div class="checkbox-wrapper">
                    <div class="checkbox-image"></div>
                    <input type="checkbox" name="bolacha" id="item004">
                    <label for="item004">Bolacha</label>
                </div>
                <button type="button" class="btn-delete">
                    <img src="./assets/lixeira.png" alt="">
                </button>
            </li>

        </ul>

    </form>

    <footer class="container">
        <img src="./assets/warning-circle-filled.png" alt="">
        <span>O item foi removido da lista</span>
        <img src="./assets/delete-small.png" alt="" class="btn-close">
    </footer>



    <script src="./js/scripts.js"></script>
</body>
</html>
